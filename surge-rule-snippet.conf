[Rule]
# Personal non-IP overrides. Explicit personal decisions win over upstream rules.
RULE-SET,https://raw.githubusercontent.com/aimcrfui/surge-rules/main/rules/personal/non_ip/reject.list,REJECT,extended-matching
RULE-SET,https://raw.githubusercontent.com/aimcrfui/surge-rules/main/rules/personal/non_ip/direct.list,DIRECT,extended-matching
RULE-SET,https://raw.githubusercontent.com/aimcrfui/surge-rules/main/rules/personal/non_ip/home.list,Home,extended-matching
RULE-SET,https://raw.githubusercontent.com/aimcrfui/surge-rules/main/rules/personal/non_ip/telegram.list,Telegram,extended-matching
RULE-SET,https://raw.githubusercontent.com/aimcrfui/surge-rules/main/rules/personal/non_ip/ai.list,AIGC,extended-matching
RULE-SET,https://raw.githubusercontent.com/aimcrfui/surge-rules/main/rules/personal/non_ip/stream.list,Stream,extended-matching
RULE-SET,https://raw.githubusercontent.com/aimcrfui/surge-rules/main/rules/personal/non_ip/foreign.list,Foreign,extended-matching
RULE-SET,https://raw.githubusercontent.com/aimcrfui/surge-rules/main/rules/personal/non_ip/in.list,in,extended-matching

# Upstream domain and non-IP rules. Specific services must precede global/domestic fallbacks.
DOMAIN-SET,https://ruleset.skk.moe/List/domainset/reject.conf,REJECT
RULE-SET,https://ruleset.skk.moe/List/non_ip/reject.conf,REJECT,extended-matching
DOMAIN-SET,https://ruleset.skk.moe/List/domainset/speedtest.conf,Home,extended-matching
DOMAIN-SET,https://ruleset.skk.moe/List/domainset/cdn.conf,Foreign,extended-matching
RULE-SET,https://ruleset.skk.moe/List/non_ip/cdn.conf,Foreign,extended-matching
RULE-SET,https://ruleset.skk.moe/List/non_ip/telegram.conf,Telegram,extended-matching
DOMAIN-SET,https://ruleset.skk.moe/List/domainset/apple_cdn.conf,in
RULE-SET,https://ruleset.skk.moe/List/non_ip/microsoft_cdn.conf,in
RULE-SET,https://ruleset.skk.moe/List/non_ip/apple_cn.conf,in
RULE-SET,https://ruleset.skk.moe/List/non_ip/apple_services.conf,in,extended-matching
RULE-SET,https://ruleset.skk.moe/List/non_ip/microsoft.conf,in,extended-matching
RULE-SET,https://ruleset.skk.moe/List/non_ip/ai.conf,AIGC,extended-matching
RULE-SET,https://ruleset.skk.moe/List/non_ip/stream.conf,Stream,extended-matching
RULE-SET,https://ruleset.skk.moe/List/non_ip/global.conf,Foreign,extended-matching
RULE-SET,https://ruleset.skk.moe/List/non_ip/domestic.conf,in,extended-matching
RULE-SET,https://ruleset.skk.moe/List/non_ip/lan.conf,in

# Personal IP overrides. Keep every IP ruleset after all non-IP rules.
RULE-SET,https://raw.githubusercontent.com/aimcrfui/surge-rules/main/rules/personal/ip/reject.list,REJECT
RULE-SET,https://raw.githubusercontent.com/aimcrfui/surge-rules/main/rules/personal/ip/direct.list,DIRECT
RULE-SET,https://raw.githubusercontent.com/aimcrfui/surge-rules/main/rules/personal/ip/home.list,Home
RULE-SET,https://raw.githubusercontent.com/aimcrfui/surge-rules/main/rules/personal/ip/telegram.list,Telegram
RULE-SET,https://raw.githubusercontent.com/aimcrfui/surge-rules/main/rules/personal/ip/ai.list,AIGC
RULE-SET,https://raw.githubusercontent.com/aimcrfui/surge-rules/main/rules/personal/ip/stream.list,Stream
RULE-SET,https://raw.githubusercontent.com/aimcrfui/surge-rules/main/rules/personal/ip/foreign.list,Foreign
RULE-SET,https://raw.githubusercontent.com/aimcrfui/surge-rules/main/rules/personal/ip/in.list,in

# Upstream IP rules trigger local DNS only after every domain/non-IP rule has had a chance to match.
RULE-SET,https://ruleset.skk.moe/List/ip/reject.conf,REJECT-DROP
RULE-SET,https://ruleset.skk.moe/List/ip/telegram.conf,Telegram
RULE-SET,https://ruleset.skk.moe/List/ip/stream.conf,Stream
RULE-SET,https://ruleset.skk.moe/List/ip/lan.conf,in
RULE-SET,https://ruleset.skk.moe/List/ip/domestic.conf,in
RULE-SET,https://ruleset.skk.moe/List/ip/china_ip.conf,in
GEOIP,CN,in
FINAL,Foreign,dns-failed
